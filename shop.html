<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <title>جميع المنتجات | waziz shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* نفس الأنماط من index.html */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ink: #0a0a0a;
            --ink2: #181818;
            --sand: #f4efe8;
            --sand2: #ece6dc;
            --gold: #b8966e;
            --gold2: #d4b896;
            --gold-pale: #f0e6d6;
            --white: #fff;
            --muted: #87877e;
            --muted2: #b5b5ac;
            --red: #c0392b;
            --green: #27ae60;
            --r1: 6px;
            --r2: 14px;
            --r3: 22px;
            --sh1: 0 1px 4px rgba(0, 0, 0, .06);
            --sh2: 0 4px 24px rgba(0, 0, 0, .08);
            --sh3: 0 12px 48px rgba(0, 0, 0, .14);
            --t: .28s cubic-bezier(.25, .46, .45, .94);
            --tf: .16s cubic-bezier(.25, .46, .45, .94);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--sand);
            color: var(--ink);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        img {
            display: block;
            max-width: 100%;
            height: auto;
        }

        button {
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            border: none;
            background: none;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 16px;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 900;
            background: rgba(10, 10, 10, .95);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-bottom: 1px solid rgba(184, 150, 110, .14);
        }

        .hdr {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 18px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
            cursor: pointer;
        }

        .logo-main {
            font-family: 'Playfair Display', serif;
            font-size: 19px;
            font-style: italic;
            color: var(--white);
            letter-spacing: .02em;
        }

        .logo-main span {
            color: var(--gold);
        }

        .logo-sub {
            font-size: 8.5px;
            color: var(--muted);
            letter-spacing: .18em;
            text-transform: uppercase;
            font-weight: 300;
        }

        .hdr-actions {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .hdr-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 15px;
            border-radius: 50%;
            transition: background var(--tf);
        }

        .hdr-btn:hover {
            background: rgba(255, 255, 255, .08);
        }

        .hero {
            position: relative;
            background: var(--ink);
            overflow: hidden;
            padding: 64px 20px 52px;
            text-align: center;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 80% 55% at 50% 120%, rgba(184, 150, 110, .17) 0%, transparent 70%),
                        radial-gradient(ellipse 38% 38% at 82% 2%, rgba(184, 150, 110, .07) 0%, transparent 60%);
        }

        .hero-grain {
            position: absolute;
            inset: 0;
            opacity: .35;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.05'/%3E%3C/svg%3E");
        }

        .hero-c {
            position: relative;
            z-index: 1;
            max-width: 560px;
            margin: 0 auto;
        }

        .hero-eye {
            font-size: 9.5px;
            letter-spacing: .26em;
            text-transform: uppercase;
            color: var(--gold);
            font-weight: 500;
            margin-bottom: 14px;
        }

        .hero h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(30px, 5.5vw, 52px);
            font-weight: 400;
            color: var(--white);
            line-height: 1.2;
            margin-bottom: 14px;
        }

        .hero h2 em {
            font-style: italic;
            color: var(--gold2);
        }

        .hero-line {
            width: 44px;
            height: 1px;
            background: var(--gold);
            margin: 18px auto;
        }

        .hero-sub {
            font-size: 13px;
            color: var(--muted2);
            font-weight: 300;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 32px 0 56px;
        }

        @media (min-width: 580px) {
            .grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 16px;
            }
        }

        @media (min-width: 860px) {
            .grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 18px;
            }
        }

        .pcard {
            background: var(--white);
            border-radius: var(--r2);
            overflow: hidden;
            cursor: pointer;
            border: 1px solid rgba(0, 0, 0, .05);
            position: relative;
            transition: transform var(--t), box-shadow var(--t);
        }

        .pcard:hover {
            transform: translateY(-4px);
            box-shadow: var(--sh3);
        }

        .pcard-img {
            position: relative;
            aspect-ratio: 1;
            overflow: hidden;
            background: var(--sand2);
        }

        .pcard-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform .55s cubic-bezier(.25, .46, .45, .94);
        }

        .pcard:hover .pcard-img img {
            transform: scale(1.06);
        }

        .pcard-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 3px 8px;
            border-radius: 99px;
            font-size: 9.5px;
            font-weight: 700;
            letter-spacing: .03em;
        }

        .b-sale {
            background: var(--ink);
            color: var(--gold);
        }

        .b-oos {
            background: rgba(192, 57, 43, .88);
            color: #fff;
            backdrop-filter: blur(4px);
        }

        .b-cat {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(10, 10, 10, .75);
            color: var(--gold2);
            padding: 2px 7px;
            border-radius: 99px;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: .04em;
            backdrop-filter: blur(6px);
        }

        .oos-lay {
            position: absolute;
            inset: 0;
            background: rgba(244, 239, 232, .62);
            backdrop-filter: blur(1.5px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .oos-lay span {
            background: rgba(192, 57, 43, .88);
            color: #fff;
            padding: 5px 14px;
            border-radius: 99px;
            font-size: 11.5px;
            font-weight: 700;
        }

        .pcard-body {
            padding: 10px 12px 13px;
        }

        .pcard-name {
            font-size: 12.5px;
            font-weight: 500;
            color: var(--ink);
            margin-bottom: 7px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 34px;
        }

        .pcard-price {
            display: flex;
            align-items: baseline;
            gap: 6px;
            margin-bottom: 7px;
        }

        .pp-main {
            font-size: 15px;
            font-weight: 800;
            color: var(--gold);
        }

        .pp-main small {
            font-size: 9.5px;
            font-weight: 500;
        }

        .pp-old {
            font-size: 10.5px;
            color: var(--muted2);
            text-decoration: line-through;
        }

        .pcard-ship {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 9.5px;
            color: var(--green);
            font-weight: 500;
        }

        .pcard-ship i {
            font-size: 8.5px;
        }

        .sec-hdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 30px 0 18px;
        }

        .sec-kicker {
            font-size: 9.5px;
            letter-spacing: .22em;
            text-transform: uppercase;
            color: var(--gold);
            font-weight: 500;
            margin-bottom: 3px;
        }

        .sec-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(20px, 3.5vw, 28px);
            font-weight: 400;
            color: var(--ink);
        }

        .sec-count {
            font-size: 11.5px;
            color: var(--muted);
            background: var(--sand2);
            padding: 3px 11px;
            border-radius: 99px;
            font-weight: 500;
        }

        .alert-ov {
            position: fixed;
            inset: 0;
            z-index: 9000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            background: rgba(0, 0, 0, .38);
            backdrop-filter: blur(5px);
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--t);
        }

        .alert-ov.open {
            opacity: 1;
            pointer-events: all;
        }

        .alert-card {
            background: var(--white);
            border-radius: var(--r3);
            padding: 26px 22px;
            max-width: 290px;
            width: 100%;
            text-align: center;
            box-shadow: var(--sh3);
            transform: scale(.93);
            transition: transform var(--t);
        }

        .alert-ov.open .alert-card {
            transform: scale(1);
        }

        .alert-icon {
            font-size: 26px;
            margin-bottom: 10px;
        }

        .alert-title {
            font-size: 15.5px;
            font-weight: 700;
            margin-bottom: 7px;
        }

        .alert-msg {
            font-size: 12.5px;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .alert-ok {
            padding: 9px 26px;
            background: var(--ink);
            color: var(--white);
            border-radius: var(--r2);
            font-size: 12.5px;
            font-weight: 700;
            cursor: pointer;
            transition: background var(--tf);
        }

        .alert-ok:hover {
            background: var(--ink2);
        }

        footer {
            background: var(--ink);
            color: rgba(255, 255, 255, .68);
            padding: 34px 20px 22px;
            margin-top: 40px;
        }

        .footer-in {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 26px;
            padding-bottom: 22px;
            border-bottom: 1px solid rgba(255, 255, 255, .07);
        }

        .fb .logo-main {
            font-size: 21px;
            margin-bottom: 6px;
        }

        .fb p {
            font-size: 11.5px;
            line-height: 1.7;
            max-width: 190px;
        }

        .fc h4 {
            font-size: 10.5px;
            text-transform: uppercase;
            letter-spacing: .15em;
            color: var(--gold);
            font-weight: 600;
            margin-bottom: 11px;
        }

        .fc p {
            font-size: 12.5px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .footer-bot {
            max-width: 1200px;
            margin: 0 auto;
            padding-top: 16px;
            text-align: center;
            font-size: 10.5px;
            color: rgba(255, 255, 255, .3);
        }

        @media (max-width: 480px) {
            .footer-in {
                grid-template-columns: 1fr;
                gap: 20px;
                text-align: center;
            }
            .fb p {
                max-width: 100%;
            }
            .fc p {
                justify-content: center;
            }
            .hero {
                padding: 50px 16px 40px;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="hdr">
        <div class="logo" onclick="window.location.href='index.html'">
            <div class="logo-main"><span>waziz</span> shop</div>
            <div class="logo-sub">fashion · style · quality</div>
        </div>
        <div class="hdr-actions">
            <button class="hdr-btn" onclick="window.location.href='cart.html'" aria-label="السلة">
                <i class="fas fa-bag-shopping"></i>
            </button>
        </div>
    </div>
</header>

<section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-grain"></div>
    <div class="hero-c">
        <p class="hero-eye">جميع المنتجات</p>
        <h2>تشكيلتنا<br><em>الكاملة</em></h2>
        <div class="hero-line"></div>
        <p class="hero-sub">توصيل مجاني · دفع عند الاستلام · جودة عالية</p>
    </div>
</section>

<div class="container">
    <div class="sec-hdr">
        <div>
            <p class="sec-kicker">تشكيلتنا</p>
            <h2 class="sec-title">المنتجات</h2>
        </div>
        <span class="sec-count" id="productCount"></span>
    </div>
    <div class="grid" id="productsGrid"></div>
</div>

<div class="alert-ov" id="alertOv">
    <div class="alert-card">
        <div class="alert-icon" id="alertIcon">⚠️</div>
        <div class="alert-title" id="alertTitle"></div>
        <div class="alert-msg" id="alertMsg"></div>
        <button class="alert-ok" onclick="closeAlert()">حسناً</button>
    </div>
</div>

<footer>
    <div class="footer-in">
        <div class="fb">
            <div class="logo-main" style="margin-bottom:6px"><span>waziz</span> shop</div>
            <p>متجرك الأول للموضة — أناقة، جودة، وتوصيل سريع لباب دارك.</p>
        </div>
        <div class="fc">
            <h4>تواصل معنا</h4>
            <p><i class="fas fa-phone" style="color:var(--gold)"></i> 0635208269</p>
            <p><i class="fas fa-location-dot" style="color:var(--gold)"></i> الدار البيضاء، المغرب</p>
        </div>
    </div>
    <div class="footer-bot">© 2026 waziz shop — جميع الحقوق محفوظة</div>
</footer>

<script>
    const products = [
        { id: 12, name: "Ensemble likra mkhtat", price: "219", originalPrice: "259", description: "اونصوبل ليكرا توب مليح", cat: "clothes", images: ["Untitled design (6).webp", "Untitled design (7).webp"], sizes: ["m","l","xl"], inStock: true },
        { id: 18, name: "Ensemble t-shirt en SARWAL rido", price: "219", originalPrice: "299", description: "Ensemble t-shirt en SARWAL rido - جودة عالية وتصميم عصري", cat: "clothes", images: ["photo_2026-03-27_23-27-34.webp", "photo_2026-03-27_23-27-39.webp", "photo_2026-03-27_23-27-47.webp"], sizes: ["m","l","xl"], inStock: true },
        { id: 17, name: "ENSEMBLE RIDO BLA JIB (SHOMIS & chort)", price: "199", originalPrice: "299", description: "SHOMIS & chort", cat: "clothes", images: ["Gemini_Generated_Image_tkom7utkom7utkom.webp", "Gemini_Generated_Image_3o2t5k3o2t5k3o2t.webp", "Gemini_Generated_Image_viswvyviswvyvisw.webp"], sizes: ["m","l","xl"], inStock: true },
        { id: 10, name: "Ensemble swid", price: "219", originalPrice: "249", description: "اونصومبل توب غليض تاع البرد .", cat: "clothes", images: ["WhatsApp Image 2026-03-02 at 02.46.23.webp", "WhatsApp Image 2026-03-02 at 02.49.27.webp"], sizes: ["m","l","xl"], inStock: true },
        { id: 6, name: "Sweet nike", price: "199", originalPrice: "299", description: "المليح ثوب مونطوني مقطن.", cat: "clothes", images: ["Gemini_Generated_Image_o3s4y2o3s4y2o3s4.webp", "Gemini_Generated_Image_rk9k64rk9k64rk9k.webp", "Gemini_Generated_Image_dhbtp9dhbtp9dhbt.webp", "Gemini_Generated_Image_3vprbh3vprbh3vpr.webp"], sizes: ["m","l","xl"], inStock: false },
        { id: 9, name: "Ensemble Rédou b sensla", price: "229", originalPrice: "299", description: "اونصومبل توب غليض تاع البرد بالسنسلة مزيانة فيه جياب.", cat: "clothes", images: ["1760905019_IMG_0375.webp", "Untitled design (29).webp", "Untitled design (30).webp"], sizes: ["m","l","xl","xxl"], inStock: true },
        { id: 13, name: "Ensemble rido shomis et srwal", price: "199", originalPrice: "259", description: "Ensemble rido shomis et srwal", cat: "clothes", images: ["1754474745_WhatsApp Image 2025-08-05 at 23.47.53 (2).webp", "1754474745_WhatsApp Image 2025-08-05 at 23.47.53.webp", "1754474745_WhatsApp Image 2025-08-05 at 23.47.53 (1).webp"], sizes: ["m","l","xl"], inStock: true },
        { id: 14, name: "Ensemble sweet likra simple", price: "219", originalPrice: "299", description: "سويت ليكرا مليح.", cat: "clothes", images: ["3.webp", "1.webp", "2.webp"], sizes: ["m","l","xl"], inStock: true },
        { id: 1, name: "Ensemble nike", price: "219", originalPrice: "299", description: "اونسومبل NIKE صيفي لرجال 💥 التوب مونطوني مقطن", cat: "clothes", images: ["1757028183_instagram-1756553237064.webp", "1757028183_IMG_20250830_122844_404 (1).webp"], sizes: ["m","l","xl"], inStock: false },
        { id: 15, name: "ساعة رجالية Casio", price: "199", originalPrice: "230", description: "✅ مصنوعة من مواد قوية مقاومة للصدمات والتآكل ✅ أناقة 💼 + مقاومة للماء 💧 + جودة عالية 🔋 ✅ مثالية للرجال", cat: "watches", images: ["photo_2025-10-25_21-42-52 (5).webp", "photo_2026-03-20_16-48-35.webp", "photo_2025-10-25_21-42-52 (2).webp", "photo_2025-10-25_21-42-52 (3).webp", "photo_2025-10-25_21-42-52 (4).webp"], sizes: [], inStock: true }
    ];

    function renderProducts() {
        const grid = document.getElementById('productsGrid');
        const productCount = document.getElementById('productCount');
        
        productCount.textContent = products.length + ' منتج';
        grid.innerHTML = '';
        
        const catLabels = { clothes: 'ملابس', watches: 'ساعات' };
        
        products.forEach(p => {
            const card = document.createElement('div');
            card.className = 'pcard';
            const disc = Math.round((1 - +p.price / +p.originalPrice) * 100);
            const catLbl = catLabels[p.cat] || '';
            
            card.innerHTML = `
                <div class="pcard-img">
                    <img src="${p.images[0]}" alt="${p.name}" loading="lazy" width="300" height="300" decoding="async">
                    ${disc > 0 ? `<span class="pcard-badge b-sale">-${disc}%</span>` : ''}
                    ${!p.inStock ? `<span class="pcard-badge b-oos" style="top:8px;left:auto;right:8px">نفذ</span><div class="oos-lay"><span>نفذت الكمية</span></div>` : ''}
                    ${catLbl ? `<span class="b-cat">${catLbl}</span>` : ''}
                </div>
                <div class="pcard-body">
                    <div class="pcard-name">${p.name}</div>
                    <div class="pcard-price">
                        <span class="pp-main">${p.price} <small>درهم</small></span>
                        <span class="pp-old">${p.originalPrice} درهم</span>
                    </div>
                    <span class="pcard-ship"><i class="fas fa-truck"></i> توصيل مجاني</span>
                </div>
            `;
            
            if (p.inStock) {
                card.onclick = () => {
                    window.location.href = `product.html?id=${p.id}`;
                };
            } else {
                card.onclick = () => showAlert('⚠️', 'نفذت الكمية', 'نأسف، هذا المنتج غير متوفر حالياً.');
            }
            
            grid.appendChild(card);
        });
    }

    function showAlert(icon, title, msg) {
        document.getElementById('alertIcon').textContent = icon;
        document.getElementById('alertTitle').textContent = title;
        document.getElementById('alertMsg').textContent = msg;
        document.getElementById('alertOv').classList.add('open');
    }

    function closeAlert() {
        document.getElementById('alertOv').classList.remove('open');
    }

    document.addEventListener('DOMContentLoaded', renderProducts);
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeAlert(); });
</script>
</body>
</html>
