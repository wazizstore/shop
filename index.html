let cart=[],currentProduct=null,selectedColor='',selectedSize='',currentImageIndex=0,fullscreenCurrentIndex=0;
function renderHomePage(){const main=document.getElementById('mainContent');main.innerHTML=`<section class="hero"><div class="container"><h2>waziz shop</h2><p>توصيل مجاني لجميع مدن المغرب</p></div></section><div class="container"><h2 class="section-title">منتجاتنا</h2><div class="products-grid" id="productsGrid"></div></div>`;const grid=document.getElementById('productsGrid');grid.innerHTML='';products.forEach(p=>{const card=document.createElement('div');card.className='product-card';if(!p.inStock)card.onclick=e=>{e.stopPropagation();showModal('نفذت الكمية','هذا المنتج قد نفد')};else card.onclick=()=>viewProduct(p.id);let outHtml='';if(!p.inStock)outHtml=`<div class="out-of-stock-badge">نفذت الكمية</div><div class="out-of-stock-overlay"><span>نفذ</span></div>`;card.innerHTML=`<div class="product-image"><img src="${p.images[0]}" alt="${p.name}" loading="lazy" width="300" height="300">${outHtml}</div><div class="product-info"><div class="product-name">${p.name}</div><div class="price-container"><span class="original-price">${p.originalPrice} درهم</span><span class="product-price">${p.price} درهم</span></div><div class="delivery-badge"><i class="fas fa-truck"></i> توصيل مجاني</div></div>`;grid.appendChild(card)});window.scrollTo(0,0)}
function viewProduct(id){const p=products.find(x=>x.id===id);if(!p)return;currentProduct=p;selectedColor='';selectedSize='';currentImageIndex=0;const thumbnails=p.images.map((img,i)=>`<div class="thumbnail ${i===0?'active':''}" onclick="changeImage(${i})"><img src="${img}" alt="صورة ${i+1}" loading="lazy"></div>`).join('');const colorOpts=p.colors.map(c=>`<div class="color-option ${c.class} ${!c.inStock?'disabled':''}" onclick="${!c.inStock?`showColorOutOfStock('${c.name}')`:`selectColor('${c.name}',this)`}" title="${c.name}"></div>`).join('');const sizeOpts=p.sizes.map(s=>`<option value="${s}">${s.toUpperCase()}</option>`).join('');const sizeHtml=p.noSizes?'':`<div class="size-section"><h3>اختر القياس</h3><select class="size-select" id="productSize"><option value="">اختر قياس...</option>${sizeOpts}</select><div class="unknown-size"><input type="checkbox" id="unknownSizeCheck" onchange="toggleSizeFields()"><label>لا أعرف قياسي</label></div><div class="size-fields" id="sizeFields"><input type="number" id="height" placeholder="الطول (سم)"><input type="number" id="weight" placeholder="الوزن (كغم)"></div></div>`;document.getElementById('mainContent').innerHTML=`<div class="product-page"><div class="container"><div class="back-btn" onclick="renderHomePage()"><i class="fas fa-arrow-right"></i> العودة</div><div class="product-gallery"><div class="main-image-container"><img src="${p.images[0]}" id="mainImage"><div class="slider-arrow left" onclick="previousImage()"><i class="fas fa-chevron-right"></i></div><div class="slider-arrow right" onclick="nextImage()"><i class="fas fa-chevron-left"></i></div><div class="zoom-icon" onclick="openFullscreen()"><i class="fas fa-expand"></i></div></div><div class="image-thumbnails">${thumbnails}</div></div><div class="product-info-detail"><h1>${p.name}</h1><div class="product-price-detail">${p.price} <small>درهم</small></div><div class="product-original-price">${p.originalPrice} درهم</div><div class="product-description">${p.description}</div><div class="delivery-info"><i class="fas fa-truck"></i> توصيل مجاني - الدفع عند الاستلام</div>${!p.noColors?`<div class="color-section"><h3>اختر اللون</h3><div class="color-options">${colorOpts}</div></div>`:''}${sizeHtml}<div class="product-actions-detail"><button class="add-to-cart-detail" onclick="addToCart()"><i class="fas fa-cart-plus"></i> أضف إلى السلة</button><button class="order-now-detail" onclick="handleOrderNow()"><i class="fas fa-bolt"></i> اطلب الآن</button></div></div><div class="order-section" id="orderSection"><div class="free-delivery"><i class="fas fa-truck"></i> التوصيل مجاني</div><h2>📝 أكمل معلومات الطلب</h2><div class="form-grid"><div class="form-group"><label>الاسم الكامل *</label><input type="text" id="orderName" placeholder="أحمد العلوي"></div><div class="form-group"><label>رقم الهاتف *</label><input type="tel" id="orderPhone" placeholder="06 XX XX XX XX"></div><div class="form-group"><label>المدينة *</label><input type="text" id="orderCity" placeholder="الدار البيضاء"></div><div class="form-group"><label>العنوان *</label><input type="text" id="orderAddress" placeholder="العنوان الكامل"></div><div class="form-group"><label>الكمية</label><input type="number" id="orderQuantity" min="1" value="1"></div><button class="submit-order-btn" onclick="submitOrder()">تأكيد الطلب</button></div></div></div></div>`;window.scrollTo(0,0)}
function previousImage(){if(!currentProduct)return;currentImageIndex--;if(currentImageIndex<0)currentImageIndex=currentProduct.images.length-1;updateMainImage()}
function nextImage(){if(!currentProduct)return;currentImageIndex++;if(currentImageIndex>=currentProduct.images.length)currentImageIndex=0;updateMainImage()}
function changeImage(i){currentImageIndex=i;updateMainImage()}
function updateMainImage(){const main=document.getElementById('mainImage');if(main&&currentProduct)main.src=currentProduct.images[currentImageIndex];document.querySelectorAll('.thumbnail').forEach((t,i)=>{if(i===currentImageIndex)t.classList.add('active');else t.classList.remove('active')})}
let touchStart=0;document.addEventListener('touchstart',e=>{touchStart=e.touches[0].clientX});document.addEventListener('touchend',e=>{const diff=touchStart-e.changedTouches[0].clientX;if(Math.abs(diff)>40){diff>0?nextImage():previousImage()}});
function openFullscreen(){fullscreenCurrentIndex=currentImageIndex;const ov=document.getElementById('fullscreenOverlay');document.getElementById('fullscreenImage').src=currentProduct.images[currentImageIndex];ov.classList.add('active')}
function closeFullscreen(){document.getElementById('fullscreenOverlay').classList.remove('active')}
function fullscreenPrevImage(){if(!currentProduct)return;fullscreenCurrentIndex--;if(fullscreenCurrentIndex<0)fullscreenCurrentIndex=currentProduct.images.length-1;document.getElementById('fullscreenImage').src=currentProduct.images[fullscreenCurrentIndex]}
function fullscreenNextImage(){if(!currentProduct)return;fullscreenCurrentIndex++;if(fullscreenCurrentIndex>=currentProduct.images.length)fullscreenCurrentIndex=0;document.getElementById('fullscreenImage').src=currentProduct.images[fullscreenCurrentIndex]}
function selectColor(n,el){selectedColor=n;document.querySelectorAll('.color-option').forEach(o=>o.classList.remove('selected'));el.classList.add('selected')}
function showColorOutOfStock(n){const av=currentProduct.colors.filter(c=>c.inStock!==false).map(c=>c.name).join('، ');showModal('نفذ اللون',`نفذ لون ${n}، المتبقي: ${av}`)}
function toggleSizeFields(){const cb=document.getElementById('unknownSizeCheck'),fields=document.getElementById('sizeFields'),sel=document.getElementById('productSize');if(cb&&cb.checked){fields.classList.add('active');sel.disabled=true;selectedSize=''}else if(cb){fields.classList.remove('active');sel.disabled=false}}
function getSizeFromMeasurements(h,w){if(!currentProduct)return null;const sizeChart=[{name:"M",hMin:165,hMax:175,wMin:62,wMax:70},{name:"L",hMin:170,hMax:180,wMin:70,wMax:78},{name:"XL",hMin:175,hMax:185,wMin:78,wMax:86},{name:"XXL",hMin:180,hMax:190,wMin:86,wMax:95}];let rec=null;for(let s of sizeChart){if(h>=s.hMin&&h<=s.hMax&&w>=s.wMin&&w<=s.wMax){rec=s.name;break}}if(!rec){let best=null,minDiff=Infinity;sizeChart.forEach(s=>{const diff=Math.abs(h-(s.hMin+s.hMax)/2)+Math.abs(w-(s.wMin+s.wMax)/2);if(diff<minDiff){minDiff=diff;best=s.name}});rec=best}if(!currentProduct.sizes||currentProduct.sizes.length===0)return rec;const avail=currentProduct.sizes.map(s=>s.toUpperCase());if(avail.includes(rec))return rec;const order=["XS","S","M","L","XL","XXL","XXXL"];const recIdx=order.indexOf(rec);if(recIdx===-1)return avail[0];let bestMatch=avail[0],bestDiff=Infinity;avail.forEach(s=>{const idx=order.indexOf(s.toUpperCase());if(idx!==-1){const diff=Math.abs(recIdx-idx);if(diff<bestDiff){bestDiff=diff;bestMatch=s}}});return bestMatch}
function updateCustomSize(){const h=document.getElementById('height')?.value,w=document.getElementById('weight')?.value;if(h&&w){const sz=getSizeFromMeasurements(parseInt(h),parseInt(w));if(sz){selectedSize=sz;const sel=document.getElementById('productSize');if(sel){const opt=Array.from(sel.options).find(o=>o.value.toUpperCase()===sz.toUpperCase());if(opt)sel.value=opt.value}showToast(`✅ تم تحديد المقاس: ${sz.toUpperCase()}`)}else selectedSize=`الطول: ${h} سم - الوزن: ${w} كغم`}}
function validateSelection(){if(!currentProduct.noColors&&currentProduct.colors?.length>0&&!selectedColor){showToast('يرجى اختيار اللون');return false}if(!currentProduct.noSizes){const sel=document.getElementById('productSize'),cb=document.getElementById('unknownSizeCheck');if(cb&&cb.checked){const h=document.getElementById('height')?.value,w=document.getElementById('weight')?.value;if(!h||!w){showToast('يرجى إدخال الطول والوزن');return false}}else{if(!sel||!sel.value){showToast('يرجى اختيار القياس');return false}selectedSize=sel.value}}else selectedSize='قياس واحد';return true}
function addToCart(){if(!validateSelection())return;cart.push({id:currentProduct.id,name:currentProduct.name,price:currentProduct.price,color:selectedColor,size:selectedSize});document.getElementById('cartCount').textContent=cart.length;showToast('✅ تمت الإضافة')}
function handleOrderNow(){if(!validateSelection())return;document.getElementById('orderSection').scrollIntoView({behavior:'smooth'})}
async function submitOrder(){const name=document.getElementById('orderName').value.trim(),phone=document.getElementById('orderPhone').value.trim(),city=document.getElementById('orderCity').value.trim(),addr=document.getElementById('orderAddress').value.trim(),qty=document.getElementById('orderQuantity')?.value||1;if(!name||!phone||!city||!addr){showToast('يرجى ملء جميع الحقول');return}if(!currentProduct.noColors&&currentProduct.colors?.length>0&&!selectedColor){showToast('يرجى اختيار اللون');return}if(!selectedSize&&!currentProduct.noSizes){showToast('يرجى اختيار القياس');return}let msg=`🛍️ طلب جديد\n👤 ${name}\n📱 ${phone}\n🏙️ ${city}\n📍 ${addr}\n\n📦 ${currentProduct.name}\n💰 ${currentProduct.price} درهم\n📊 الكمية: ${qty}\n🎨 اللون: ${selectedColor||'غير محدد'}\n📐 ${currentProduct.noSizes?'بدون قياس':selectedSize}`;try{const res=await fetch(`https://api.telegram.org/bot8387473741:AAGHOI-oS7HXYFPSKfBmzotZ2PGCGNxhJiU/sendMessage`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:'6781508116',text:msg})});if(res.ok){const sec=document.getElementById('orderSection');sec.innerHTML=`<div class="success-message">✅ تم تسجيل طلبك بنجاح<br>سنتصل بك قريباً<br>رمضان مبارك<span class="close-success" onclick="renderHomePage()">&times;</span></div>`}else showToast('حدث خطأ')}catch(e){showToast('خطأ في الاتصال')}}
function showModal(t,m){const d=document.getElementById('modal');d.innerHTML=`<div class="modal"><div class="modal-content"><h3>${t}</h3><p>${m}</p><button class="modal-close" onclick="closeModal()">حسناً</button></div></div>`;d.style.display='block'}
function closeModal(){document.getElementById('modal').style.display='none'}
function showToast(m){const t=document.getElementById('toastNotification');document.getElementById('toastMessage').textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function toggleCart(){const s=document.getElementById('cartSidebar');s.classList.toggle('open');if(s.classList.contains('open'))updateCartDisplay()}
function updateCartDisplay(){const items=document.getElementById('cartItems'),totalEl=document.getElementById('cartTotal');if(cart.length===0){items.innerHTML='<div style="text-align:center;color:#666;">السلة فارغة</div>';totalEl.textContent='0 درهم';return}let html='',total=0;cart.forEach((i,idx)=>{total+=parseInt(i.price);html+=`<div class="cart-item"><div><div class="cart-item-name">${i.name}</div><div class="cart-item-details">${i.color} | ${i.size}</div></div><div><span class="cart-item-price">${i.price} درهم</span><span class="remove-item" onclick="removeFromCart(${idx})">✕</span></div></div>`});items.innerHTML=html;totalEl.textContent=`${total} درهم`}
function removeFromCart(i){cart.splice(i,1);document.getElementById('cartCount').textContent=cart.length;updateCartDisplay()}
function showCartCheckout(){if(cart.length===0){showToast('السلة فارغة');return}const items=document.getElementById('checkoutItems');let html='<h4>المنتجات:</h4>',total=0;cart.forEach(i=>{total+=parseInt(i.price);html+=`<div style="display:flex;justify-content:space-between;padding:4px 0;"><span>${i.name} (${i.color})</span><span>${i.price} درهم</span></div>`});html+=`<div style="font-weight:bold;margin-top:8px;">المجموع: ${total} درهم</div>`;items.innerHTML=html;document.getElementById('cartCheckoutForm').style.display='flex'}
function closeCartCheckout(){document.getElementById('cartCheckoutForm').style.display='none'}
async function submitCartOrder(){const name=document.getElementById('checkoutName').value.trim(),phone=document.getElementById('checkoutPhone').value.trim(),city=document.getElementById('checkoutCity').value.trim(),addr=document.getElementById('checkoutAddress').value.trim();if(!name||!phone||!city||!addr){showToast('يرجى ملء جميع الحقول');return}let msg=`🛒 طلب من السلة\n👤 ${name}\n📱 ${phone}\n🏙️ ${city}\n📍 ${addr}\n\n📋 المنتجات:\n`;let total=0;cart.forEach((i,idx)=>{total+=parseInt(i.price);msg+=`${idx+1}. ${i.name} - ${i.color} - ${i.size} - ${i.price} درهم\n`});msg+=`\n💰 المجموع: ${total} درهم`;try{const res=await fetch(`https://api.telegram.org/bot8387473741:AAGHOI-oS7HXYFPSKfBmzotZ2PGCGNxhJiU/sendMessage`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:'6781508116',text:msg})});if(res.ok){const cont=document.querySelector('.checkout-content');cont.innerHTML=`<div class="success-message">✅ تم تسجيل طلبك بنجاح<br>سنتصل بك قريباً<span class="close-success" onclick="location.reload()">&times;</span></div>`;cart=[];document.getElementById('cartCount').textContent='0'}else showToast('حدث خطأ')}catch(e){showToast('خطأ في الاتصال')}}
document.addEventListener('DOMContentLoaded',()=>{renderHomePage();setInterval(()=>{document.getElementById('cartCount').textContent=cart.length},1000)});
</script>
