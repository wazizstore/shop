<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <title>تفاصيل المنتج | waziz shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ink: #0a0a0a;
            --ink2: #181818;
            --sand: #f4efe8;
            --sand2: #ece6dc;
            --gold: #b8966e;
            --gold2: #d4b896;
            --gold-pale: #f0e6d6;
            --white: #fff;
            --muted: #87877e;
            --muted2: #b5b5ac;
            --red: #c0392b;
            --green: #27ae60;
            --r1: 6px;
            --r2: 14px;
            --r3: 22px;
            --r4: 32px;
            --sh1: 0 1px 4px rgba(0, 0, 0, .06);
            --sh2: 0 4px 24px rgba(0, 0, 0, .08);
            --sh3: 0 12px 48px rgba(0, 0, 0, .14);
            --t: .28s cubic-bezier(.25, .46, .45, .94);
            --tf: .16s cubic-bezier(.25, .46, .45, .94);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--sand);
            color: var(--ink);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        img {
            display: block;
            max-width: 100%;
            height: auto;
        }

        button {
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            border: none;
            background: none;
        }

        input, select {
            font-family: 'Tajawal', sans-serif;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 16px;
        }

        /* LOADING SPINNER */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--ink);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(184, 150, 110, 0.2);
            border-top-color: var(--gold);
            border-right-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-overlay.hide {
            opacity: 0;
            visibility: hidden;
        }

        /* HEADER */
        header {
            position: sticky;
            top: 0;
            z-index: 900;
            background: rgba(10, 10, 10, .95);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-bottom: 1px solid rgba(184, 150, 110, .14);
        }

        .hdr {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 18px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
            cursor: pointer;
        }

        .logo-main {
            font-family: 'Playfair Display', serif;
            font-size: 19px;
            font-style: italic;
            color: var(--white);
            letter-spacing: .02em;
        }

        .logo-main span {
            color: var(--gold);
        }

        .logo-sub {
            font-size: 8.5px;
            color: var(--muted);
            letter-spacing: .18em;
            text-transform: uppercase;
            font-weight: 300;
        }

        .hdr-actions {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .hdr-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 15px;
            border-radius: 50%;
            transition: background var(--tf);
        }

        .hdr-btn:hover {
            background: rgba(255, 255, 255, .08);
        }

        /* BREADCRUMB */
        .breadcrumb-bar {
            background: var(--white);
            border-bottom: 1px solid rgba(0, 0, 0, .06);
            padding: 0 18px;
        }

        .breadcrumb-inner {
            max-width: 1200px;
            margin: 0 auto;
            height: 46px;
            display: flex;
            align-items: center;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-size: 12.5px;
            font-weight: 500;
            color: var(--muted);
            transition: color var(--tf);
        }

        .back-link:hover {
            color: var(--ink);
        }

        .back-link i {
            font-size: 10px;
        }

        .crumb-sep {
            color: var(--muted2);
            font-size: 10px;
            margin: 0 7px;
        }

        .crumb-cur {
            font-size: 12.5px;
            color: var(--ink);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 170px;
        }

        /* PRODUCT DETAIL LAYOUT */
        .playout {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 16px 56px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 32px;
        }

        @media (min-width: 720px) {
            .playout {
                grid-template-columns: 1fr 1fr;
                align-items: start;
            }
        }

        @media (min-width: 1000px) {
            .playout {
                grid-template-columns: 1.1fr .9fr;
                gap: 48px;
            }
        }

        /* GALLERY */
        .gallery-main {
            position: relative;
            border-radius: var(--r3);
            overflow: hidden;
            background: var(--sand2);
            aspect-ratio: 1;
            margin-bottom: 12px;
        }

        .gallery-main img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gthumbs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: thin;
        }

        .gthumbs::-webkit-scrollbar {
            height: 3px;
        }

        .gthumb {
            width: 70px;
            height: 70px;
            flex-shrink: 0;
            border-radius: var(--r1);
            overflow: hidden;
            border: 2px solid transparent;
            background: var(--sand2);
            cursor: pointer;
            transition: border-color var(--tf), transform var(--tf);
        }

        .gthumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gthumb.active {
            border-color: var(--gold);
        }

        .gthumb:hover {
            transform: scale(1.05);
        }

        /* PRODUCT INFO */
        .ptag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 9.5px;
            letter-spacing: .16em;
            text-transform: uppercase;
            color: var(--gold);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .ptitle {
            font-size: clamp(20px, 3vw, 26px);
            font-weight: 700;
            color: var(--ink);
            line-height: 1.3;
            margin-bottom: 12px;
        }

        .ppricing {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .pp-big {
            font-size: 30px;
            font-weight: 800;
            color: var(--gold);
        }

        .pp-big small {
            font-size: 15px;
            font-weight: 500;
        }

        .pp-cross {
            font-size: 15px;
            color: var(--muted2);
            text-decoration: line-through;
        }

        .pp-save {
            font-size: 11px;
            background: rgba(39, 174, 96, .11);
            color: var(--green);
            padding: 2px 8px;
            border-radius: 99px;
            font-weight: 700;
        }

        .deliv-strip {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(39, 174, 96, .07);
            border: 1px solid rgba(39, 174, 96, .18);
            border-radius: var(--r1);
            padding: 10px 14px;
            margin: 16px 0;
            font-size: 13px;
            color: #1a7a40;
            font-weight: 500;
        }

        .deliv-strip i {
            color: var(--green);
            font-size: 14px;
        }

        .pdesc {
            font-size: 13.5px;
            color: var(--muted);
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .odiv {
            height: 1px;
            background: rgba(0, 0, 0, .07);
            margin: 18px 0;
        }

        .olabel {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--ink);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .olabel span {
            font-weight: 400;
            color: var(--gold);
            letter-spacing: 0;
            text-transform: none;
            font-size: 13px;
        }

        .sizes {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .szb {
            min-width: 50px;
            padding: 8px 14px;
            border-radius: var(--r1);
            border: 1.5px solid rgba(0, 0, 0, .13);
            background: var(--white);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--ink);
            transition: all var(--tf);
        }

        .szb:hover {
            border-color: var(--gold);
        }

        .szb.sel {
            background: var(--ink);
            border-color: var(--ink);
            color: var(--white);
        }

        .meas-tog {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            cursor: pointer;
            width: fit-content;
        }

        .meas-tog input {
            cursor: pointer;
            accent-color: var(--gold);
        }

        .meas-tog span {
            font-size: 12.5px;
            color: var(--muted);
        }

        .meas-tog span strong {
            color: var(--gold);
            font-weight: 600;
        }

        .meas-fields {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 12px;
            padding: 15px;
            background: var(--gold-pale);
            border-radius: var(--r2);
            border: 1px dashed var(--gold2);
        }

        .meas-fields.show {
            display: grid;
        }

        .meas-fields label {
            display: block;
            font-size: 10.5px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .1em;
            margin-bottom: 5px;
        }

        .meas-fields input {
            width: 100%;
            padding: 9px 12px;
            border: 1.5px solid rgba(0, 0, 0, .11);
            border-radius: var(--r1);
            font-size: 14px;
            font-weight: 500;
            background: var(--white);
            color: var(--ink);
            outline: none;
            transition: border-color var(--tf);
        }

        .meas-fields input:focus {
            border-color: var(--gold);
        }

        .meas-res {
            grid-column: span 2;
            text-align: center;
            font-size: 13px;
            color: var(--green);
            font-weight: 600;
            display: none;
        }

        .meas-res.show {
            display: block;
        }

        /* TRUST SECTION */
        .trust {
            display: flex;
            gap: 12px;
            padding: 14px;
            background: var(--white);
            border-radius: var(--r2);
            border: 1px solid rgba(0, 0, 0, .055);
            margin: 20px 0;
        }

        .ti {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-align: center;
        }

        .ti i {
            font-size: 16px;
            color: var(--gold);
        }

        .ti span {
            font-size: 10px;
            color: var(--muted);
            font-weight: 500;
        }

        /* ORDER CARD */
        .ocard {
            background: var(--white);
            border-radius: var(--r3);
            overflow: hidden;
            box-shadow: var(--sh2);
            border: 1px solid rgba(0, 0, 0, .055);
            margin-top: 20px;
        }

        .ocard-hdr {
            background: var(--ink);
            padding: 16px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ocard-hdr i {
            color: var(--gold);
            font-size: 16px;
        }

        .ocard-hdr h3 {
            color: var(--white);
            font-size: 15px;
            font-weight: 700;
        }

        .ocard-hdr p {
            color: var(--muted2);
            font-size: 10.5px;
            font-weight: 300;
        }

        .ocard-body {
            padding: 20px;
        }

        .frow {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .ff {
            margin-bottom: 14px;
        }

        .ff label {
            display: block;
            font-size: 10.5px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--muted);
            margin-bottom: 5px;
        }

        .ff input {
            width: 100%;
            padding: 11px 13px;
            border: 1.5px solid rgba(0, 0, 0, .09);
            border-radius: var(--r1);
            font-size: 13.5px;
            color: var(--ink);
            background: var(--sand);
            outline: none;
            transition: border-color var(--tf), background var(--tf);
        }

        .ff input:focus {
            border-color: var(--gold);
            background: var(--white);
        }

        .ff input.err {
            border-color: var(--red);
        }

        .qty-wrap {
            display: flex;
            border: 1.5px solid rgba(0, 0, 0, .09);
            border-radius: var(--r1);
            overflow: hidden;
            background: var(--sand);
        }

        .qty-btn {
            width: 40px;
            height: 42px;
            background: transparent;
            font-size: 18px;
            color: var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--tf);
        }

        .qty-btn:hover {
            background: var(--sand2);
        }

        .qty-wrap input {
            flex: 1;
            border: none;
            padding: 10px 4px;
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            background: transparent;
            outline: none;
        }

        .sub-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #181818 0%, #2a2a2a 100%);
            color: var(--white);
            border-radius: var(--r2);
            font-size: 15px;
            font-weight: 700;
            letter-spacing: .04em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 14px;
            transition: all var(--tf);
            position: relative;
            overflow: hidden;
        }

        .sub-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 30%, rgba(184, 150, 110, .22));
        }

        .sub-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 7px 28px rgba(0, 0, 0, .24);
        }

        .sub-btn:disabled {
            opacity: .6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* SUCCESS MESSAGE */
        .osuccess {
            padding: 35px 25px;
            text-align: center;
        }

        .suc-icon {
            width: 65px;
            height: 65px;
            background: rgba(39, 174, 96, .11);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 28px;
            color: var(--green);
        }

        .osuccess h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .osuccess p {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.6;
        }

        .suc-back {
            margin-top: 20px;
            padding: 10px 25px;
            background: var(--ink);
            color: var(--white);
            border-radius: var(--r2);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        /* ALERT */
        .alert-ov {
            position: fixed;
            inset: 0;
            z-index: 9000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            background: rgba(0, 0, 0, .38);
            backdrop-filter: blur(5px);
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--t);
        }

        .alert-ov.open {
            opacity: 1;
            pointer-events: all;
        }

        .alert-card {
            background: var(--white);
            border-radius: var(--r3);
            padding: 28px 24px;
            max-width: 300px;
            width: 100%;
            text-align: center;
            box-shadow: var(--sh3);
            transform: scale(.93);
            transition: transform var(--t);
        }

        .alert-ov.open .alert-card {
            transform: scale(1);
        }

        .alert-icon {
            font-size: 28px;
            margin-bottom: 12px;
        }

        .alert-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .alert-msg {
            font-size: 12.5px;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 18px;
        }

        .alert-ok {
            padding: 9px 28px;
            background: var(--ink);
            color: var(--white);
            border-radius: var(--r2);
            font-size: 12.5px;
            font-weight: 700;
            cursor: pointer;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 26px;
            left: 50%;
            transform: translateX(-50%) translateY(18px);
            background: var(--ink);
            color: var(--white);
            padding: 10px 20px;
            border-radius: 99px;
            font-size: 12.5px;
            font-weight: 500;
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            transition: all .28s cubic-bezier(.34, 1.56, .64, 1);
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.ok {
            background: var(--green);
        }

        .toast.err {
            background: var(--red);
        }

        /* FOOTER */
        footer {
            background: var(--ink);
            color: rgba(255, 255, 255, .68);
            padding: 34px 20px 22px;
            margin-top: 40px;
        }

        .footer-in {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 26px;
            padding-bottom: 22px;
            border-bottom: 1px solid rgba(255, 255, 255, .07);
        }

        .fb .logo-main {
            font-size: 21px;
            margin-bottom: 6px;
        }

        .fb p {
            font-size: 11.5px;
            line-height: 1.7;
            max-width: 190px;
        }

        .fc h4 {
            font-size: 10.5px;
            text-transform: uppercase;
            letter-spacing: .15em;
            color: var(--gold);
            font-weight: 600;
            margin-bottom: 11px;
        }

        .fc p {
            font-size: 12.5px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .footer-bot {
            max-width: 1200px;
            margin: 0 auto;
            padding-top: 16px;
            text-align: center;
            font-size: 10.5px;
            color: rgba(255, 255, 255, .3);
        }

        @media (max-width: 600px) {
            .frow {
                grid-template-columns: 1fr;
                gap: 0;
            }
            .gthumb {
                width: 55px;
                height: 55px;
            }
            .trust {
                flex-wrap: wrap;
            }
            .ti {
                min-width: 80px;
            }
        }

        @media (max-width: 480px) {
            .footer-in {
                grid-template-columns: 1fr;
                gap: 20px;
                text-align: center;
            }
            .fb p {
                max-width: 100%;
            }
            .fc p {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<!-- LOADING SPINNER -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
</div>

<!-- HEADER -->
<header>
    <div class="hdr">
        <div class="logo" onclick="window.location.href='index.html'">
            <div class="logo-main"><span>waziz</span> shop</div>
            <div class="logo-sub">fashion · style · quality</div>
        </div>
        <div class="hdr-actions">
            <button class="hdr-btn" onclick="window.location.href='cart.html'" aria-label="السلة">
                <i class="fas fa-bag-shopping"></i>
            </button>
        </div>
    </div>
</header>

<!-- BREADCRUMB -->
<div class="breadcrumb-bar">
    <div class="breadcrumb-inner">
        <a href="shop.html" class="back-link">
            <i class="fas fa-arrow-right"></i>
            <span>العودة للمتجر</span>
        </a>
        <span class="crumb-sep">›</span>
        <span class="crumb-cur" id="breadcrumbName">تحميل المنتج...</span>
    </div>
</div>

<!-- PRODUCT DETAIL CONTENT -->
<div class="playout" id="productLayout">
    <div style="text-align: center; padding: 60px 20px;">
        <i class="fas fa-spinner fa-spin" style="font-size: 32px; color: var(--gold);"></i>
        <p style="margin-top: 16px;">جاري تحميل المنتج...</p>
    </div>
</div>

<!-- ALERT MODAL -->
<div class="alert-ov" id="alertOv">
    <div class="alert-card">
        <div class="alert-icon" id="alertIcon">⚠️</div>
        <div class="alert-title" id="alertTitle"></div>
        <div class="alert-msg" id="alertMsg"></div>
        <button class="alert-ok" onclick="closeAlert()">حسناً</button>
    </div>
</div>

<!-- TOAST -->

<!-- FOOTER -->
<footer>
    <div class="footer-in">
        <div class="fb">
            <div class="logo-main" style="margin-bottom:6px"><span>waziz</span> shop</div>
            <p>متجرك الأول للموضة — أناقة، جودة، وتوصيل سريع لباب دارك.</p>
        </div>
        <div class="fc">
            <h4>تواصل معنا</h4>
            <p><i class="fas fa-phone" style="color:var(--gold)"></i> 0635208269</p>
            <p><i class="fas fa-location-dot" style="color:var(--gold)"></i> الدار البيضاء، المغرب</p>
        </div>
    </div>
    <div class="footer-bot">© 2026 waziz shop — جميع الحقوق محفوظة</div>
</footer>

<script>
    // المنتجات (نفس البيانات من الكود القديم)
    const productsData = [
        { id: 12, name: "Ensemble likra mkhtat", price: "219", originalPrice: "259", description: "اونصوبل ليكرا توب مليح", cat: "clothes", images: ["Untitled design (6).webp", "Untitled design (7).webp"], sizes: ["m","l","xl"], inStock: true },
        { id: 18, name: "Ensemble t-shirt en SARWAL rido", price: "219", originalPrice: "299", description: "Ensemble t-shirt en SARWAL rido - جودة عالية وتصميم عصري", cat: "clothes", images: ["photo_2026-03-27_23-27-34.webp", "photo_2026-03-27_23-27-39.webp", "photo_2026-03-27_23-27-47.webp"], sizes: ["m","l","xl"], inStock: true },
        { id: 17, name: "ENSEMBLE RIDO BLA JIB (SHOMIS & chort)", price: "199", originalPrice: "299", description: "SHOMIS & chort", cat: "clothes", images: ["Gemini_Generated_Image_tkom7utkom7utkom.webp", "Gemini_Generated_Image_3o2t5k3o2t5k3o2t.webp", "Gemini_Generated_Image_viswvyviswvyvisw.webp"], sizes: ["m","l","xl"], inStock: true },
        { id: 10, name: "Ensemble swid", price: "219", originalPrice: "249", description: "اونصومبل توب غليض تاع البرد .", cat: "clothes", images: ["WhatsApp Image 2026-03-02 at 02.46.23.webp", "WhatsApp Image 2026-03-02 at 02.49.27.webp"], sizes: ["m","l","xl"], inStock: true },
        { id: 6, name: "Sweet nike", price: "199", originalPrice: "299", description: "المليح ثوب مونطوني مقطن.", cat: "clothes", images: ["Gemini_Generated_Image_o3s4y2o3s4y2o3s4.webp", "Gemini_Generated_Image_rk9k64rk9k64rk9k.webp", "Gemini_Generated_Image_dhbtp9dhbtp9dhbt.webp", "Gemini_Generated_Image_3vprbh3vprbh3vpr.webp"], sizes: ["m","l","xl"], inStock: false },
        { id: 9, name: "Ensemble Rédou b sensla", price: "229", originalPrice: "299", description: "اونصومبل توب غليض تاع البرد بالسنسلة مزيانة فيه جياب.", cat: "clothes", images: ["1760905019_IMG_0375.webp", "Untitled design (29).webp", "Untitled design (30).webp"], sizes: ["m","l","xl","xxl"], inStock: true },
        { id: 13, name: "Ensemble rido shomis et srwal", price: "199", originalPrice: "259", description: "Ensemble rido shomis et srwal", cat: "clothes", images: ["1754474745_WhatsApp Image 2025-08-05 at 23.47.53 (2).webp", "1754474745_WhatsApp Image 2025-08-05 at 23.47.53.webp", "1754474745_WhatsApp Image 2025-08-05 at 23.47.53 (1).webp"], sizes: ["m","l","xl"], inStock: true },
        { id: 14, name: "Ensemble sweet likra simple", price: "219", originalPrice: "299", description: "سويت ليكرا مليح.", cat: "clothes", images: ["3.webp", "1.webp", "2.webp"], sizes: ["m","l","xl"], inStock: true },
        { id: 1, name: "Ensemble nike", price: "219", originalPrice: "299", description: "اونسومبل NIKE صيفي لرجال 💥 التوب مونطوني مقطن", cat: "clothes", images: ["1757028183_instagram-1756553237064.webp", "1757028183_IMG_20250830_122844_404 (1).webp"], sizes: ["m","l","xl"], inStock: false },
        { id: 15, name: "ساعة رجالية Casio", price: "199", originalPrice: "230", description: "✅ مصنوعة من مواد قوية مقاومة للصدمات والتآكل ✅ أناقة 💼 + مقاومة للماء 💧 + جودة عالية 🔋 ✅ مثالية للرجال", cat: "watches", images: ["photo_2025-10-25_21-42-52 (5).webp", "photo_2026-03-20_16-48-35.webp", "photo_2025-10-25_21-42-52 (2).webp", "photo_2025-10-25_21-42-52 (3).webp", "photo_2025-10-25_21-42-52 (4).webp"], sizes: [], inStock: true }
    ];

    let selectedSize = '';

    function getProductIdFromUrl() {
        const params = new URLSearchParams(window.location.search);
        return parseInt(params.get('id'));
    }

    function showToast(message, type = '') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = 'toast show' + (type ? ' ' + type : '');
        setTimeout(() => toast.classList.remove('show'), 2600);
    }

    function showAlert(icon, title, msg) {
        document.getElementById('alertIcon').textContent = icon;
        document.getElementById('alertTitle').textContent = title;
        document.getElementById('alertMsg').textContent = msg;
        document.getElementById('alertOv').classList.add('open');
    }

    function closeAlert() {
        document.getElementById('alertOv').classList.remove('open');
    }

    function validatePhone(phone) {
        return /^(06|07)\d{8}$/.test(phone.replace(/\s/g, ''));
    }

    function changeQuantity(delta) {
        const qtyInput = document.getElementById('orderQuantity');
        if (qtyInput) {
            let newVal = parseInt(qtyInput.value) + delta;
            if (newVal < 1) newVal = 1;
            qtyInput.value = newVal;
        }
    }

    function renderProductDetails() {
        const productId = getProductIdFromUrl();
        const product = productsData.find(p => p.id === productId);
        
        if (!product) {
            document.getElementById('productLayout').innerHTML = `
                <div style="text-align: center; padding: 60px 20px;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 48px; color: var(--red);"></i>
                    <p style="margin-top: 20px; font-size: 18px;">المنتج غير موجود</p>
                    <a href="shop.html" style="display: inline-block; margin-top: 20px; padding: 10px 25px; background: var(--gold); color: white; border-radius: var(--r2);">العودة للمتجر</a>
                </div>
            `;
            return null;
        }
        
        document.getElementById('breadcrumbName').textContent = product.name;
        
        const disc = Math.round((1 - +product.price / +product.originalPrice) * 100);
        const saved = +product.originalPrice - +product.price;
        
        const thumbs = product.images.map((img, idx) => `
            <div class="gthumb ${idx === 0 ? 'active' : ''}" data-img="${img}">
                <img src="${img}" alt="" loading="lazy">
            </div>
        `).join('');
        
        const sizeOptions = product.sizes && product.sizes.length ? `
            <div class="odiv"></div>
            <div class="olabel">اختر القياس <span id="selectedSizeLabel"></span></div>
            <div class="sizes" id="sizesContainer">
                ${product.sizes.map(s => `<button class="szb" data-size="${s}">${s.toUpperCase()}</button>`).join('')}
            </div>
            <label class="meas-tog">
                <input type="checkbox" id="measCb">
                <span>لا أعرف قياسي — <strong>احسب قياسك</strong></span>
            </label>
            <div class="meas-fields" id="measFields">
                <div><label>الطول (سم)</label><input type="number" id="heightInput" placeholder="175"></div>
                <div><label>الوزن (كغم)</label><input type="number" id="weightInput" placeholder="75"></div>
                <div class="meas-res" id="measRes"></div>
            </div>
        ` : '';
        
        const html = `
            <div>
                <div class="gallery-main">
                    <img src="${product.images[0]}" alt="${product.name}" id="mainProductImage">
                </div>
                ${product.images.length > 1 ? `<div class="gthumbs" id="galleryThumbs">${thumbs}</div>` : ''}
            </div>
            <div>
                <p class="ptag"><i class="fas fa-star"></i> وصل حديثاً</p>
                <h1 class="ptitle">${product.name}</h1>
                <div class="ppricing">
                    <span class="pp-big">${product.price} <small>درهم</small></span>
                    <span class="pp-cross">${product.originalPrice} درهم</span>
                    ${disc > 0 ? `<span class="pp-save">وفّر ${saved} درهم</span>` : ''}
                </div>
                <div class="deliv-strip">
                    <i class="fas fa-truck-fast"></i>
                    <span>توصيل مجاني — الدفع عند الاستلام</span>
                </div>
                <p class="pdesc">${product.description}</p>
                
                ${sizeOptions}
                
                <div class="odiv"></div>
                <div class="trust">
                    <div class="ti"><i class="fas fa-shield-halved"></i><span>شراء آمن</span></div>
                    <div class="ti"><i class="fas fa-rotate-left"></i><span>ضمان الجودة</span></div>
                    <div class="ti"><i class="fas fa-headset"></i><span>دعم 24/7</span></div>
                    <div class="ti"><i class="fas fa-truck"></i><span>توصيل سريع</span></div>
                </div>
                
                <div class="ocard">
                    <div class="ocard-hdr">
                        <i class="fas fa-lock"></i>
                        <div><h3>إتمام الطلب</h3><p>ادفع عند الاستلام · توصيل مجاني</p></div>
                    </div>
                    <div class="ocard-body">
                        <div class="frow">
                            <div class="ff"><label>الاسم الكامل</label><input type="text" id="customerName" placeholder="أحمد العلوي"></div>
                            <div class="ff"><label>رقم الهاتف</label><input type="tel" id="customerPhone" placeholder="06XXXXXXXX"></div>
                        </div>
                        <div class="frow">
                            <div class="ff"><label>المدينة</label><input type="text" id="customerCity" placeholder="الدار البيضاء"></div>
                            <div class="ff"><label>الكمية</label>
                                <div class="qty-wrap">
                                    <button class="qty-btn" onclick="changeQuantity(-1)">−</button>
                                    <input type="number" id="orderQuantity" value="1" min="1">
                                    <button class="qty-btn" onclick="changeQuantity(1)">+</button>
                                </div>
                            </div>
                        </div>
                        <div class="ff"><label>العنوان الكامل</label><input type="text" id="customerAddress" placeholder="الحي، الشارع، رقم المنزل..."></div>
                        <button class="sub-btn" id="submitOrderBtn">
                            <i class="fas fa-check-circle"></i> تأكيد الطلب — ${product.price} درهم
                        </button>
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('productLayout').innerHTML = html;
        
        // Setup gallery thumbnails
        if (product.images.length > 1) {
            document.querySelectorAll('.gthumb').forEach(thumb => {
                thumb.addEventListener('click', function() {
                    const imgSrc = this.getAttribute('data-img');
                    document.getElementById('mainProductImage').src = imgSrc;
                    document.querySelectorAll('.gthumb').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                });
            });
        }
        
        // Setup size selection
        if (product.sizes && product.sizes.length) {
            document.querySelectorAll('.szb').forEach(btn => {
                btn.addEventListener('click', function() {
                    const size = this.getAttribute('data-size');
                    selectedSize = size;
                    document.querySelectorAll('.szb').forEach(b => b.classList.remove('sel'));
                    this.classList.add('sel');
                    document.getElementById('selectedSizeLabel').textContent = size.toUpperCase();
                });
            });
            
            const measCb = document.getElementById('measCb');
            const measFields = document.getElementById('measFields');
            if (measCb) {
                measCb.addEventListener('change', function() {
                    measFields.classList.toggle('show', this.checked);
                    if (!this.checked) {
                        document.querySelectorAll('.szb').forEach(b => b.disabled = false);
                        selectedSize = '';
                        document.getElementById('selectedSizeLabel').textContent = '';
                    } else {
                        document.querySelectorAll('.szb').forEach(b => { b.disabled = true; b.classList.remove('sel'); });
                        selectedSize = '';
                        document.getElementById('selectedSizeLabel').textContent = '';
                    }
                });
            }
            
            const heightInput = document.getElementById('heightInput');
            const weightInput = document.getElementById('weightInput');
            const measRes = document.getElementById('measRes');
            
            function calculateSize() {
                const h = parseInt(heightInput?.value);
                const w = parseInt(weightInput?.value);
                if (!h || !w) return;
                const sizeChart = [
                    { name: "M", hMin: 165, hMax: 175, wMin: 62, wMax: 70 },
                    { name: "L", hMin: 170, hMax: 180, wMin: 70, wMax: 78 },
                    { name: "XL", hMin: 175, hMax: 185, wMin: 78, wMax: 86 },
                    { name: "XXL", hMin: 180, hMax: 190, wMin: 86, wMax: 95 }
                ];
                let rec = null;
                for (const s of sizeChart) {
                    if (h >= s.hMin && h <= s.hMax && w >= s.wMin && w <= s.wMax) {
                        rec = s.name; break;
                    }
                }
                if (!rec) {
                    let best = null, minDiff = Infinity;
                    sizeChart.forEach(s => {
                        const diff = Math.abs(h - (s.hMin + s.hMax)/2) + Math.abs(w - (s.wMin + s.wMax)/2);
                        if (diff < minDiff) { minDiff = diff; best = s.name; }
                    });
                    rec = best;
                }
                if (rec && product.sizes.map(s => s.toUpperCase()).includes(rec)) {
                    selectedSize = rec;
                    measRes.textContent = `✓ قياسك المقترح: ${rec.toUpperCase()}`;
                    measRes.classList.add('show');
                    document.getElementById('selectedSizeLabel').textContent = rec.toUpperCase();
                } else if (rec && product.sizes.length) {
                    const available = product.sizes.map(s => s.toUpperCase());
                    selectedSize = available[0];
                    measRes.textContent = `✓ تم اختيار ${selectedSize.toUpperCase()} (المقاس المتوفر الأقرب)`;
                    measRes.classList.add('show');
                    document.getElementById('selectedSizeLabel').textContent = selectedSize.toUpperCase();
                }
            }
            
            if (heightInput && weightInput) {
                heightInput.addEventListener('input', calculateSize);
                weightInput.addEventListener('input', calculateSize);
            }
        }
        
        // Setup submit button
        const submitBtn = document.getElementById('submitOrderBtn');
        if (submitBtn) {
            submitBtn.addEventListener('click', async () => {
                const name = document.getElementById('customerName')?.value.trim();
                const phone = document.getElementById('customerPhone')?.value.trim();
                const city = document.getElementById('customerCity')?.value.trim();
                const address = document.getElementById('customerAddress')?.value.trim();
                const quantity = document.getElementById('orderQuantity')?.value || 1;
                
                if (!name || !phone || !city || !address) {
                    showToast('يرجى ملء جميع الحقول', 'err');
                    return;
                }
                
                if (!validatePhone(phone)) {
                    showToast('رقم الهاتف غير صحيح (مثال: 0612345678)', 'err');
                    document.getElementById('customerPhone')?.classList.add('err');
                    return;
                }
                document.getElementById('customerPhone')?.classList.remove('err');
                
                if (product.sizes && product.sizes.length) {
                    const measCb = document.getElementById('measCb');
                    if (measCb?.checked) {
                        const height = document.getElementById('heightInput')?.value;
                        const weight = document.getElementById('weightInput')?.value;
                        if (!height || !weight) {
                            showToast('يرجى إدخال الطول والوزن', 'err');
                            return;
                        }
                    } else if (!selectedSize) {
                        showToast('يرجى اختيار القياس', 'err');
                        return;
                    }
                }
                
                const sizeText = selectedSize ? selectedSize.toUpperCase() : 'بدون قياس';
                const totalPrice = parseInt(product.price) * quantity;
                
                const TG_TOKEN = '8387473741:AAGHOI-oS7HXYFPSKfBmzotZ2PGCGNxhJiU';
                const TG_CHAT = '6781508116';
                
                const message = `🛍️ طلب جديد من waziz shop\n\n` +
                    `👤 الاسم: ${name}\n` +
                    `📱 الهاتف: ${phone}\n` +
                    `🏙️ المدينة: ${city}\n` +
                    `📍 العنوان: ${address}\n\n` +
                    `📦 المنتج: ${product.name}\n` +
                    `💰 السعر: ${product.price} درهم\n` +
                    `📊 الكمية: ${quantity}\n` +
                    `💵 الإجمالي: ${totalPrice} درهم\n` +
                    `📐 القياس: ${sizeText}\n\n` +
                    `⏱️ تاريخ الطلب: ${new Date().toLocaleString('ar-MA')}`;
                
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...';
                
                try {
                    const response = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: TG_CHAT, text: message })
                    });
                    
                    if (response.ok) {
                        const ocardBody = document.querySelector('.ocard-body');
                        if (ocardBody) {
                            ocardBody.innerHTML = `
                                <div class="osuccess">
                                    <div class="suc-icon"><i class="fas fa-check"></i></div>
                                    <h3>تم استلام طلبك! 🎉</h3>
                                    <p>شكراً <strong>${name}</strong>، سنتصل بك قريباً على <strong>${phone}</strong> لتأكيد الطلب.</p>
                                    <button class="suc-back" onclick="window.location.href='shop.html'">
                                        <i class="fas fa-arrow-right"></i> متابعة التسوق
                                    </button>
                                </div>
                            `;
                        }
                    } else {
                        showToast('حدث خطأ، حاول مجدداً', 'err');
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = `<i class="fas fa-check-circle"></i> تأكيد الطلب — ${product.price} درهم`;
                    }
                } catch (error) {
                    showToast('خطأ في الاتصال', 'err');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = `<i class="fas fa-check-circle"></i> تأكيد الطلب — ${product.price} درهم`;
                }
            });
        }
        
        return product;
    }
    
    // Initialize page with loading spinner
    document.addEventListener('DOMContentLoaded', () => {
        // Show loading spinner
        const loadingOverlay = document.getElementById('loadingOverlay');
        loadingOverlay.classList.remove('hide');
        
        // Simulate minimum loading time for smooth experience
        setTimeout(() => {
            const product = renderProductDetails();
            // Hide loading spinner after everything is loaded
            loadingOverlay.classList.add('hide');
        }, 500);
    });
    
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeAlert();
    });
</script>
